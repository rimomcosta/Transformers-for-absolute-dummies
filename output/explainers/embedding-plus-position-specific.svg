<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="760" viewBox="0 0 1280 760" role="img" aria-labelledby="title desc">
  <title id="title">Adding positional encoding to embeddings</title>
  <desc id="desc">A worked example showing a word embedding vector added element-wise to its positional encoding vector to produce a position-aware representation.</desc>
  <rect width="1280" height="760" fill="#f8f3e8"/>
  <text x="60" y="70" font-family="Helvetica, Arial, sans-serif" font-size="34" font-weight="700" fill="#183153">Position is added directly to the word embedding, dimension by dimension</text>
  <text x="60" y="108" font-family="Helvetica, Arial, sans-serif" font-size="20" fill="#4c5b6b">The result carries both meaning and location at the same time.</text>
  <g font-family="Helvetica, Arial, sans-serif" fill="#183153">
    <rect x="80" y="220" width="330" height="140" rx="22" fill="#eef8ff" stroke="#2563eb" stroke-width="3"/>
    <text x="130" y="275" font-size="28" font-weight="700">word embedding for "love"</text>
    <text x="120" y="325" font-size="22">[-0.40, 0.60, 0.00, 0.25, 0.90, -0.30]</text>

    <rect x="470" y="220" width="330" height="140" rx="22" fill="#fff4d8" stroke="#c48a00" stroke-width="3"/>
    <text x="520" y="275" font-size="28" font-weight="700">position 1 encoding</text>
    <text x="520" y="325" font-size="22">[0.84, 0.54, 0.05, 1.00, 0.00, 1.00]</text>

    <circle cx="875" cy="290" r="34" fill="#fef3c7" stroke="#b7791f" stroke-width="3"/>
    <text x="862" y="301" font-size="34" font-weight="700">+</text>

    <rect x="960" y="220" width="260" height="140" rx="22" fill="#e8f8f0" stroke="#2f855a" stroke-width="3"/>
    <text x="995" y="275" font-size="28" font-weight="700">combined vector</text>
    <text x="990" y="325" font-size="22">[0.44, 1.14, 0.05, 1.25, 0.90, 0.70]</text>

    <rect x="190" y="470" width="900" height="150" rx="22" fill="#fffdf8" stroke="#d7c9ad" stroke-width="2"/>
    <text x="240" y="525" font-size="28" font-weight="700">Interpretation</text>
    <text x="240" y="570" font-size="22" fill="#4c5b6b">The embedding says what the word means.</text>
    <text x="240" y="605" font-size="22" fill="#4c5b6b">The positional encoding says where the word sits in the sequence.</text>
  </g>
</svg>
