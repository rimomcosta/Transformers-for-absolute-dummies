<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="760" viewBox="0 0 1280 760" role="img" aria-labelledby="title desc">
  <title id="title">Softmax over vocabulary logits</title>
  <desc id="desc">A small example vocabulary distribution showing logits converted into probabilities and one token receiving the highest probability.</desc>
  <rect width="1280" height="760" fill="#f8f3e8"/>
  <text x="60" y="70" font-family="Helvetica, Arial, sans-serif" font-size="34" font-weight="700" fill="#183153">After the output head, softmax turns logits into a probability distribution</text>
  <text x="60" y="108" font-family="Helvetica, Arial, sans-serif" font-size="20" fill="#4c5b6b">All tokens compete. The highest probability becomes the most likely next token.</text>
  <g font-family="Helvetica, Arial, sans-serif" fill="#183153">
    <text x="150" y="210" font-size="28" font-weight="700">logits</text>
    <rect x="140" y="245" width="160" height="54" rx="12" fill="#dbeafe" stroke="#2563eb" stroke-width="2"/><text x="170" y="280" font-size="22">"I" = -2.3</text>
    <rect x="140" y="325" width="160" height="54" rx="12" fill="#dcfce7" stroke="#2f855a" stroke-width="2"/><text x="164" y="360" font-size="22">"love" = 1.8</text>
    <rect x="140" y="405" width="160" height="54" rx="12" fill="#ffedd5" stroke="#dd6b20" stroke-width="2"/><text x="160" y="440" font-size="22">"pizza" = 0.5</text>
    <rect x="140" y="485" width="160" height="54" rx="12" fill="#fde68a" stroke="#b7791f" stroke-width="2"/><text x="180" y="520" font-size="22">"is" = 4.7</text>

    <text x="470" y="210" font-size="28" font-weight="700">softmax</text>
    <circle cx="540" cy="390" r="70" fill="#fff4d8" stroke="#c48a00" stroke-width="3"/>
    <text x="502" y="402" font-size="34" font-weight="700">softmax</text>

    <text x="760" y="210" font-size="28" font-weight="700">probabilities</text>
    <rect x="760" y="245" width="22" height="18" fill="#2563eb"/><text x="800" y="260" font-size="22">"I" = 0.02%</text>
    <rect x="760" y="325" width="30" height="18" fill="#2f855a"/><text x="800" y="340" font-size="22">"love" = 1.21%</text>
    <rect x="760" y="405" width="26" height="18" fill="#dd6b20"/><text x="800" y="420" font-size="22">"pizza" = 0.33%</text>
    <rect x="760" y="485" width="180" height="24" fill="#b7791f"/><text x="960" y="503" font-size="22">"is" = 21.99%</text>
  </g>
  <defs>
    <marker id="arrowProb" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#7b8794"/>
    </marker>
  </defs>
  <path d="M 320 390 H 460" stroke="#7b8794" stroke-width="5" fill="none" marker-end="url(#arrowProb)"/>
  <path d="M 610 390 H 730" stroke="#7b8794" stroke-width="5" fill="none" marker-end="url(#arrowProb)"/>
</svg>
