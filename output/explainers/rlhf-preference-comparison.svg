<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="760" viewBox="0 0 1280 760" role="img" aria-labelledby="title desc">
  <title id="title">RLHF preference comparison</title>
  <desc id="desc">A human preference comparison where two candidate answers are ranked and the ranking becomes a reward signal for training.</desc>
  <rect width="1280" height="760" fill="#f8f3e8"/>
  <text x="60" y="70" font-family="Helvetica, Arial, sans-serif" font-size="34" font-weight="700" fill="#183153">RLHF learns from ranked responses, not just from one gold answer</text>
  <text x="60" y="108" font-family="Helvetica, Arial, sans-serif" font-size="20" fill="#4c5b6b">Humans compare outputs. The model learns which style of answer people prefer.</text>

  <g font-family="Helvetica, Arial, sans-serif" fill="#183153">
    <rect x="90" y="170" width="1100" height="90" rx="20" fill="#eef8ff" stroke="#2563eb" stroke-width="3"/>
    <text x="130" y="225" font-size="28" font-weight="700">Prompt: Explain photosynthesis</text>

    <rect x="90" y="310" width="470" height="260" rx="24" fill="#e8f8f0" stroke="#2f855a" stroke-width="3"/>
    <text x="130" y="360" font-size="28" font-weight="700">Response A</text>
    <text x="130" y="405" font-size="22">Plants use sunlight, water, and carbon dioxide</text>
    <text x="130" y="438" font-size="22">to make glucose and oxygen. Chlorophyll helps</text>
    <text x="130" y="471" font-size="22">capture the light energy needed for the process.</text>
    <rect x="130" y="510" width="140" height="38" rx="12" fill="#dcfce7"/>
    <text x="155" y="536" font-size="20" fill="#2f855a">clear and correct</text>

    <rect x="720" y="310" width="470" height="260" rx="24" fill="#fde2e2" stroke="#d64545" stroke-width="3"/>
    <text x="760" y="360" font-size="28" font-weight="700">Response B</text>
    <text x="760" y="405" font-size="22">Photosynthesis is when plants do light stuff</text>
    <text x="760" y="438" font-size="22">to stay alive. It is basically energy magic.</text>
    <rect x="760" y="510" width="170" height="38" rx="12" fill="#fee2e2"/>
    <text x="787" y="536" font-size="20" fill="#d64545">vague and less useful</text>

    <path d="M 605 390 H 675" stroke="#7b8794" stroke-width="5" marker-end="url(#arrowRLHF)"/>
    <text x="540" y="350" font-size="24" font-weight="700">human compares</text>

    <rect x="390" y="620" width="500" height="90" rx="20" fill="#fff4d8" stroke="#c48a00" stroke-width="2"/>
    <text x="430" y="672" font-size="28" font-weight="700">Preference signal: A is better than B</text>
  </g>

  <defs>
    <marker id="arrowRLHF" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#7b8794"/>
    </marker>
  </defs>
</svg>
