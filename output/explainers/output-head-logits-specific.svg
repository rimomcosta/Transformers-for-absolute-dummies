<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="760" viewBox="0 0 1280 760" role="img" aria-labelledby="title desc">
  <title id="title">Output head projects hidden state to vocabulary logits</title>
  <desc id="desc">A final hidden vector multiplied by the vocabulary matrix to produce one score for every token in the vocabulary.</desc>
  <rect width="1280" height="760" fill="#f8f3e8"/>
  <text x="60" y="70" font-family="Helvetica, Arial, sans-serif" font-size="34" font-weight="700" fill="#183153">The output head compares the hidden state against every vocabulary token</text>
  <text x="60" y="108" font-family="Helvetica, Arial, sans-serif" font-size="20" fill="#4c5b6b">One hidden vector in, 50,000 logits out.</text>
  <g font-family="Helvetica, Arial, sans-serif" fill="#183153">
    <rect x="80" y="280" width="260" height="110" rx="20" fill="#eef8ff" stroke="#2563eb" stroke-width="3"/>
    <text x="118" y="330" font-size="28" font-weight="700">final hidden state</text>
    <text x="118" y="365" font-size="20">[0.71, -0.23, 0.84, 0.45, -0.12, 0.56]</text>
    <rect x="470" y="220" width="250" height="220" rx="22" fill="#fff4d8" stroke="#c48a00" stroke-width="3"/>
    <text x="520" y="275" font-size="28" font-weight="700">W_vocab</text>
    <text x="520" y="318" font-size="22">shape = 6 × 50,000</text>
    <text x="520" y="360" font-size="22">one score per token</text>
    <rect x="860" y="210" width="290" height="250" rx="22" fill="#fffdf8" stroke="#d7c9ad" stroke-width="2"/>
    <text x="915" y="265" font-size="28" font-weight="700">logits</text>
    <text x="900" y="315" font-size="22">"I" = -2.3</text>
    <text x="900" y="350" font-size="22">"love" = 1.8</text>
    <text x="900" y="385" font-size="22">"pizza" = 0.5</text>
    <text x="900" y="420" font-size="22">"is" = 4.7</text>
  </g>
  <defs>
    <marker id="arrowLogit" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#7b8794"/>
    </marker>
  </defs>
  <path d="M 340 335 H 470" stroke="#7b8794" stroke-width="5" fill="none" marker-end="url(#arrowLogit)"/>
  <path d="M 720 335 H 860" stroke="#7b8794" stroke-width="5" fill="none" marker-end="url(#arrowLogit)"/>
</svg>
