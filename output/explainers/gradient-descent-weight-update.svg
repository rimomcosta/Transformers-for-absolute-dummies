<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="760" viewBox="0 0 1280 760" role="img" aria-labelledby="title desc">
  <title id="title">Gradient descent weight update</title>
  <desc id="desc">A concrete weight update showing old weight, gradient, learning rate, and the resulting new weight after moving downhill.</desc>
  <rect width="1280" height="760" fill="#f8f3e8"/>
  <text x="60" y="70" font-family="Helvetica, Arial, sans-serif" font-size="34" font-weight="700" fill="#183153">Gradient descent updates a weight by taking a small step downhill</text>
  <text x="60" y="108" font-family="Helvetica, Arial, sans-serif" font-size="20" fill="#4c5b6b">Update rule: W_new = W_old - learning_rate × gradient</text>

  <g font-family="Helvetica, Arial, sans-serif" fill="#183153">
    <rect x="90" y="250" width="220" height="110" rx="20" fill="#eef8ff" stroke="#2563eb" stroke-width="3"/>
    <text x="145" y="300" font-size="28" font-weight="700">Old weight</text>
    <text x="160" y="338" font-size="24">0.50000</text>

    <rect x="370" y="250" width="220" height="110" rx="20" fill="#ffece3" stroke="#dd6b20" stroke-width="3"/>
    <text x="430" y="300" font-size="28" font-weight="700">Gradient</text>
    <text x="448" y="338" font-size="24">-0.702</text>

    <rect x="650" y="250" width="220" height="110" rx="20" fill="#fff4d8" stroke="#c48a00" stroke-width="3"/>
    <text x="690" y="300" font-size="28" font-weight="700">Learning rate</text>
    <text x="718" y="338" font-size="24">0.0001</text>

    <rect x="930" y="250" width="220" height="110" rx="20" fill="#e8f8f0" stroke="#2f855a" stroke-width="3"/>
    <text x="980" y="300" font-size="28" font-weight="700">New weight</text>
    <text x="995" y="338" font-size="24">0.50007</text>

    <rect x="180" y="470" width="920" height="150" rx="22" fill="#fffdf8" stroke="#d7c9ad" stroke-width="2"/>
    <text x="230" y="525" font-size="28" font-weight="700">Concrete computation</text>
    <text x="230" y="570" font-size="24">W_new = 0.5 - 0.0001 × (-0.702)</text>
    <text x="230" y="607" font-size="24">W_new = 0.5 + 0.0000702 ≈ 0.50007</text>
  </g>

  <defs>
    <marker id="arrowStep" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#7b8794"/>
    </marker>
  </defs>
  <path d="M 310 305 H 370" stroke="#7b8794" stroke-width="5" fill="none" marker-end="url(#arrowStep)"/>
  <path d="M 590 305 H 650" stroke="#7b8794" stroke-width="5" fill="none" marker-end="url(#arrowStep)"/>
  <path d="M 870 305 H 930" stroke="#7b8794" stroke-width="5" fill="none" marker-end="url(#arrowStep)"/>
</svg>
