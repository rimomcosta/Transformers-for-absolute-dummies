<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="760" viewBox="0 0 1280 760" role="img" aria-labelledby="title desc">
  <title id="title">Specific comparison of transformer architectures</title>
  <desc id="desc">A direct comparison of encoder-only, decoder-only, and encoder-decoder transformer behavior and tasks.</desc>
  <rect width="1280" height="760" fill="#f8f3e8"/>
  <text x="60" y="70" font-family="Helvetica, Arial, sans-serif" font-size="34" font-weight="700" fill="#183153">Three transformer families solve different problems</text>
  <text x="60" y="108" font-family="Helvetica, Arial, sans-serif" font-size="20" fill="#4c5b6b">The difference is not just the blocks. It is how information is allowed to flow.</text>

  <g font-family="Helvetica, Arial, sans-serif">
    <rect x="60" y="160" width="360" height="520" rx="24" fill="#fffdf8" stroke="#d7c9ad" stroke-width="2"/>
    <rect x="460" y="160" width="360" height="520" rx="24" fill="#fffdf8" stroke="#d7c9ad" stroke-width="2"/>
    <rect x="860" y="160" width="360" height="520" rx="24" fill="#fffdf8" stroke="#d7c9ad" stroke-width="2"/>

    <text x="145" y="212" font-size="28" font-weight="700" fill="#2f855a">Encoder-only</text>
    <text x="560" y="212" font-size="28" font-weight="700" fill="#2563eb">Decoder-only</text>
    <text x="935" y="212" font-size="28" font-weight="700" fill="#dd6b20">Encoder-decoder</text>

    <rect x="110" y="250" width="260" height="70" rx="18" fill="#e8f8f0" stroke="#2f855a" stroke-width="3"/>
    <text x="145" y="293" font-size="22" fill="#183153">See the full input at once</text>
    <path d="M 150 365 C 220 330, 290 330, 350 365" fill="none" stroke="#2f855a" stroke-width="5"/>
    <path d="M 350 365 C 290 400, 220 400, 150 365" fill="none" stroke="#2f855a" stroke-width="5"/>
    <text x="125" y="435" font-size="22" fill="#183153">Best for understanding tasks:</text>
    <text x="125" y="473" font-size="20" fill="#4c5b6b">classification, retrieval, extraction</text>
    <text x="125" y="560" font-size="20" fill="#4c5b6b">Example: BERT reads the whole sentence</text>
    <text x="125" y="590" font-size="20" fill="#4c5b6b">and builds a representation of it.</text>

    <rect x="510" y="250" width="260" height="70" rx="18" fill="#e7f3ff" stroke="#2563eb" stroke-width="3"/>
    <text x="545" y="293" font-size="22" fill="#183153">Generate one token at a time</text>
    <path d="M 535 365 H 735" fill="none" stroke="#2563eb" stroke-width="5" marker-end="url(#arrowBlue)"/>
    <text x="525" y="435" font-size="22" fill="#183153">Best for generation tasks:</text>
    <text x="525" y="473" font-size="20" fill="#4c5b6b">chat, completion, code, long-form text</text>
    <text x="525" y="560" font-size="20" fill="#4c5b6b">Example: GPT sees only the past and</text>
    <text x="525" y="590" font-size="20" fill="#4c5b6b">predicts the next token.</text>

    <rect x="910" y="250" width="260" height="70" rx="18" fill="#fff1e8" stroke="#dd6b20" stroke-width="3"/>
    <text x="944" y="293" font-size="22" fill="#183153">Read first, generate second</text>
    <rect x="930" y="350" width="100" height="58" rx="16" fill="#fef3c7" stroke="#b7791f" stroke-width="2"/>
    <text x="957" y="386" font-size="22" fill="#183153">input</text>
    <rect x="1050" y="350" width="100" height="58" rx="16" fill="#fde8e8" stroke="#d64545" stroke-width="2"/>
    <text x="1073" y="386" font-size="22" fill="#183153">output</text>
    <path d="M 1030 379 H 1050" fill="none" stroke="#dd6b20" stroke-width="5" marker-end="url(#arrowOrange)"/>
    <text x="925" y="435" font-size="22" fill="#183153">Best for transformation tasks:</text>
    <text x="925" y="473" font-size="20" fill="#4c5b6b">translation, summarization, rewriting</text>
    <text x="925" y="560" font-size="20" fill="#4c5b6b">Example: T5 encodes the source text,</text>
    <text x="925" y="590" font-size="20" fill="#4c5b6b">then decodes the target text.</text>
  </g>

  <defs>
    <marker id="arrowBlue" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#2563eb"/>
    </marker>
    <marker id="arrowOrange" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#dd6b20"/>
    </marker>
  </defs>
</svg>
