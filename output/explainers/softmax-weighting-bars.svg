<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="760" viewBox="0 0 1280 760" role="img" aria-labelledby="title desc">
  <title id="title">Softmax turns scores into attention weights</title>
  <desc id="desc">Bars showing raw scores becoming positive exponentials and then normalized attention weights that sum to one hundred percent.</desc>
  <rect width="1280" height="760" fill="#f8f3e8"/>
  <text x="60" y="70" font-family="Helvetica, Arial, sans-serif" font-size="34" font-weight="700" fill="#183153">Softmax converts raw scores into usable attention weights</text>
  <text x="60" y="108" font-family="Helvetica, Arial, sans-serif" font-size="20" fill="#4c5b6b">Use the exact numbers from the chapter: first exponentiate, then normalize.</text>
  <g font-family="Helvetica, Arial, sans-serif" fill="#183153">
    <text x="140" y="190" font-size="26" font-weight="700">Raw scaled scores</text>
    <text x="530" y="190" font-size="26" font-weight="700">Exponentials</text>
    <text x="900" y="190" font-size="26" font-weight="700">Final attention weights</text>
    <text x="85" y="270" font-size="22">I</text>
    <text x="85" y="390" font-size="22">love</text>
    <text x="85" y="510" font-size="22">pizza</text>
    <rect x="140" y="235" width="90" height="54" rx="12" fill="#e7f3ff" stroke="#2563eb" stroke-width="2"/>
    <text x="152" y="269" font-size="18">-0.0246</text>
    <rect x="140" y="355" width="90" height="54" rx="12" fill="#e8f8f0" stroke="#2f855a" stroke-width="2"/>
    <text x="152" y="389" font-size="18">-0.0142</text>
    <rect x="140" y="475" width="90" height="54" rx="12" fill="#ffece3" stroke="#dd6b20" stroke-width="2"/>
    <text x="160" y="509" font-size="18">0.1640</text>
    <rect x="300" y="236" width="110" height="52" rx="12" fill="#dbeafe"/>
    <rect x="300" y="356" width="112" height="52" rx="12" fill="#dcfce7"/>
    <rect x="300" y="476" width="134" height="52" rx="12" fill="#ffedd5"/>
    <text x="318" y="269" font-size="20">0.9757</text>
    <text x="318" y="389" font-size="20">0.9859</text>
    <text x="318" y="509" font-size="20">1.1782</text>
    <rect x="660" y="230" width="155" height="60" rx="14" fill="#dbeafe" stroke="#2563eb" stroke-width="2"/>
    <text x="694" y="268" font-size="22">31.07%</text>
    <rect x="660" y="350" width="157" height="60" rx="14" fill="#dcfce7" stroke="#2f855a" stroke-width="2"/>
    <text x="694" y="388" font-size="22">31.40%</text>
    <rect x="660" y="470" width="188" height="60" rx="14" fill="#ffedd5" stroke="#dd6b20" stroke-width="2"/>
    <text x="705" y="508" font-size="22">37.53%</text>
    <rect x="900" y="220" width="280" height="340" rx="22" fill="#fffdf8" stroke="#d7c9ad" stroke-width="2"/>
    <text x="940" y="270" font-size="28" font-weight="700">Why softmax matters</text>
    <text x="940" y="320" font-size="22" fill="#4c5b6b">1. Negative scores become positive.</text>
    <text x="940" y="360" font-size="22" fill="#4c5b6b">2. Larger scores stay larger.</text>
    <text x="940" y="400" font-size="22" fill="#4c5b6b">3. The weights add up to 100%.</text>
    <text x="940" y="460" font-size="22" font-weight="700" fill="#183153">Sum = 31.07 + 31.40 + 37.53 = 100%</text>
  </g>
  <defs>
    <marker id="arrowSoft" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#7b8794"/>
    </marker>
  </defs>
  <path d="M 435 382 H 620" fill="none" stroke="#7b8794" stroke-width="4" marker-end="url(#arrowSoft)"/>
  <text x="480" y="360" font-family="Helvetica, Arial, sans-serif" font-size="24" font-weight="700" fill="#7b8794">softmax</text>
</svg>
