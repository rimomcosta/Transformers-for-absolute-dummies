<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="700" viewBox="0 0 1200 700" role="img" aria-labelledby="title desc">
  <title id="title">Order blindness before positional encoding</title>
  <desc id="desc">A comparison showing that the same three token vectors can represent different word orders unless position information is added.</desc>
  <rect width="1200" height="700" fill="#f8f3e8"/>
  <text x="60" y="70" font-family="Helvetica, Arial, sans-serif" font-size="34" font-weight="700" fill="#183153">Without position, these look the same to the model</text>
  <text x="60" y="108" font-family="Helvetica, Arial, sans-serif" font-size="20" fill="#4c5b6b">Same words, different order, completely different meaning</text>

  <rect x="60" y="150" width="500" height="470" rx="24" fill="#fffdf8" stroke="#d7c9ad" stroke-width="2"/>
  <rect x="640" y="150" width="500" height="470" rx="24" fill="#fffdf8" stroke="#d7c9ad" stroke-width="2"/>

  <text x="90" y="200" font-family="Helvetica, Arial, sans-serif" font-size="26" font-weight="700" fill="#183153">Sentence A</text>
  <text x="90" y="235" font-family="Helvetica, Arial, sans-serif" font-size="22" fill="#2c7a7b">I love pizza</text>

  <text x="670" y="200" font-family="Helvetica, Arial, sans-serif" font-size="26" font-weight="700" fill="#183153">Sentence B</text>
  <text x="670" y="235" font-family="Helvetica, Arial, sans-serif" font-size="22" fill="#c05621">pizza love I</text>

  <g font-family="Helvetica, Arial, sans-serif" font-size="20" fill="#183153">
    <rect x="100" y="285" width="420" height="70" rx="18" fill="#e7f3ff" stroke="#3b82c4" stroke-width="2"/>
    <text x="125" y="328">Vector #1  [0.01, -0.20, 0.30, ...]</text>
    <rect x="100" y="380" width="420" height="70" rx="18" fill="#e8f8f0" stroke="#2f855a" stroke-width="2"/>
    <text x="125" y="423">Vector #2  [-0.40, 0.60, 0.00, ...]</text>
    <rect x="100" y="475" width="420" height="70" rx="18" fill="#fff1e8" stroke="#dd6b20" stroke-width="2"/>
    <text x="125" y="518">Vector #3  [0.90, -0.10, -0.20, ...]</text>
  </g>

  <g font-family="Helvetica, Arial, sans-serif" font-size="20" fill="#183153">
    <rect x="680" y="285" width="420" height="70" rx="18" fill="#e7f3ff" stroke="#3b82c4" stroke-width="2"/>
    <text x="705" y="328">Vector #1  [0.01, -0.20, 0.30, ...]</text>
    <rect x="680" y="380" width="420" height="70" rx="18" fill="#e8f8f0" stroke="#2f855a" stroke-width="2"/>
    <text x="705" y="423">Vector #2  [-0.40, 0.60, 0.00, ...]</text>
    <rect x="680" y="475" width="420" height="70" rx="18" fill="#fff1e8" stroke="#dd6b20" stroke-width="2"/>
    <text x="705" y="518">Vector #3  [0.90, -0.10, -0.20, ...]</text>
  </g>

  <line x1="560" y1="418" x2="640" y2="418" stroke="#9aa8b6" stroke-width="3" stroke-dasharray="8 8"/>
  <text x="515" y="400" font-family="Helvetica, Arial, sans-serif" font-size="40" fill="#9aa8b6">=</text>

  <rect x="230" y="575" width="160" height="34" rx="12" fill="#fef3c7"/>
  <text x="250" y="598" font-family="Helvetica, Arial, sans-serif" font-size="18" font-weight="700" fill="#7c5a00">No order signal</text>
  <rect x="810" y="575" width="160" height="34" rx="12" fill="#fef3c7"/>
  <text x="830" y="598" font-family="Helvetica, Arial, sans-serif" font-size="18" font-weight="700" fill="#7c5a00">No order signal</text>

  <path d="M 600 170 C 590 190, 590 210, 600 230 C 610 250, 610 270, 600 290" fill="none" stroke="#d64545" stroke-width="5"/>
  <circle cx="600" cy="315" r="26" fill="#d64545"/>
  <text x="585" y="323" font-family="Helvetica, Arial, sans-serif" font-size="28" font-weight="700" fill="#ffffff">?</text>
  <text x="530" y="365" font-family="Helvetica, Arial, sans-serif" font-size="22" font-weight="700" fill="#d64545">Which one is first?</text>
  <text x="505" y="395" font-family="Helvetica, Arial, sans-serif" font-size="18" fill="#6b7280">The vectors alone do not tell the model.</text>
</svg>
