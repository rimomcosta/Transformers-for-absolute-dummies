<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="760" viewBox="0 0 1280 760" role="img" aria-labelledby="title desc">
  <title id="title">BPE builds larger tokens from frequent pairs</title>
  <desc id="desc">A staged view of byte-pair encoding starting from characters and repeatedly merging common adjacent pairs into larger subwords.</desc>
  <rect width="1280" height="760" fill="#f8f3e8"/>
  <text x="60" y="70" font-family="Helvetica, Arial, sans-serif" font-size="34" font-weight="700" fill="#183153">BPE grows useful subwords by repeatedly merging frequent neighbors</text>
  <text x="60" y="108" font-family="Helvetica, Arial, sans-serif" font-size="20" fill="#4c5b6b">Start from tiny pieces, then keep the combinations that appear often in real text.</text>
  <g font-family="Helvetica, Arial, sans-serif" fill="#183153">
    <text x="100" y="205" font-size="28" font-weight="700">Step 1: characters</text>
    <rect x="100" y="240" width="60" height="60" rx="14" fill="#eef8ff" stroke="#2563eb" stroke-width="2"/><text x="122" y="278" font-size="28">c</text>
    <rect x="170" y="240" width="60" height="60" rx="14" fill="#eef8ff" stroke="#2563eb" stroke-width="2"/><text x="192" y="278" font-size="28">r</text>
    <rect x="240" y="240" width="60" height="60" rx="14" fill="#eef8ff" stroke="#2563eb" stroke-width="2"/><text x="262" y="278" font-size="28">y</text>
    <rect x="310" y="240" width="60" height="60" rx="14" fill="#eef8ff" stroke="#2563eb" stroke-width="2"/><text x="329" y="278" font-size="28">p</text>
    <rect x="380" y="240" width="60" height="60" rx="14" fill="#eef8ff" stroke="#2563eb" stroke-width="2"/><text x="402" y="278" font-size="28">t</text>
    <rect x="450" y="240" width="60" height="60" rx="14" fill="#eef8ff" stroke="#2563eb" stroke-width="2"/><text x="472" y="278" font-size="28">o</text>

    <text x="100" y="395" font-size="28" font-weight="700">Step 2: common pairs merge</text>
    <rect x="100" y="430" width="120" height="60" rx="14" fill="#fff4d8" stroke="#c48a00" stroke-width="2"/><text x="130" y="468" font-size="28">cr</text>
    <rect x="235" y="430" width="120" height="60" rx="14" fill="#fff4d8" stroke="#c48a00" stroke-width="2"/><text x="265" y="468" font-size="28">yp</text>
    <rect x="370" y="430" width="120" height="60" rx="14" fill="#fff4d8" stroke="#c48a00" stroke-width="2"/><text x="400" y="468" font-size="28">to</text>

    <text x="100" y="585" font-size="28" font-weight="700">Step 3: useful subwords survive</text>
    <rect x="100" y="620" width="180" height="60" rx="14" fill="#e8f8f0" stroke="#2f855a" stroke-width="2"/><text x="135" y="658" font-size="28">crypto</text>
    <rect x="305" y="620" width="220" height="60" rx="14" fill="#e8f8f0" stroke="#2f855a" stroke-width="2"/><text x="345" y="658" font-size="28">currency</text>

    <rect x="720" y="220" width="430" height="420" rx="22" fill="#fffdf8" stroke="#d7c9ad" stroke-width="2"/>
    <text x="760" y="275" font-size="28" font-weight="700">How tokenization then uses that vocabulary</text>
    <text x="760" y="330" font-size="24">cryptocurrency</text>
    <text x="760" y="380" font-size="22" fill="#4c5b6b">is not one token</text>
    <text x="760" y="430" font-size="24">→</text>
    <rect x="810" y="405" width="140" height="56" rx="14" fill="#dcfce7" stroke="#2f855a" stroke-width="2"/>
    <text x="840" y="441" font-size="24">crypto</text>
    <rect x="970" y="405" width="160" height="56" rx="14" fill="#dcfce7" stroke="#2f855a" stroke-width="2"/>
    <text x="1000" y="441" font-size="24">currency</text>
    <text x="760" y="520" font-size="22" fill="#4c5b6b">The model can still represent new words</text>
    <text x="760" y="555" font-size="22" fill="#4c5b6b">by combining familiar pieces.</text>
  </g>
</svg>
