<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="760" viewBox="0 0 1280 760" role="img" aria-labelledby="title desc">
  <title id="title">Specific roles of query, key, and value</title>
  <desc id="desc">A single token embedding transformed into three views: query asks what to look for, key advertises what the token offers, and value carries the content to mix into the output.</desc>
  <rect width="1280" height="760" fill="#f8f3e8"/>
  <text x="60" y="70" font-family="Helvetica, Arial, sans-serif" font-size="34" font-weight="700" fill="#183153">The same word becomes Q, K, and V for three different jobs</text>
  <text x="60" y="108" font-family="Helvetica, Arial, sans-serif" font-size="20" fill="#4c5b6b">One embedding, three learned projections, three different roles in attention</text>
  <g font-family="Helvetica, Arial, sans-serif">
    <rect x="90" y="260" width="240" height="120" rx="22" fill="#eef8ff" stroke="#2563eb" stroke-width="3"/>
    <text x="135" y="312" font-size="30" font-weight="700" fill="#183153">Word embedding</text>
    <text x="155" y="348" font-size="22" fill="#2563eb">for the token "it"</text>
    <rect x="420" y="120" width="300" height="140" rx="22" fill="#fff4d8" stroke="#c48a00" stroke-width="3"/>
    <text x="540" y="170" font-size="30" font-weight="700" text-anchor="middle" fill="#183153">Query (Q)</text>
    <text x="450" y="210" font-size="22" fill="#5f4a00">What am I looking for?</text>
    <text x="450" y="243" font-size="20" fill="#5f4a00">Example: "What earlier noun could I refer to?"</text>
    <rect x="420" y="310" width="300" height="140" rx="22" fill="#e8f8f0" stroke="#2f855a" stroke-width="3"/>
    <text x="570" y="360" font-size="30" font-weight="700" text-anchor="middle" fill="#183153">Key (K)</text>
    <text x="450" y="400" font-size="22" fill="#245a3b">What information do I advertise?</text>
    <text x="450" y="433" font-size="20" fill="#245a3b">Example: "I am a noun, a subject, a referent."</text>
    <rect x="420" y="500" width="300" height="140" rx="22" fill="#ffece3" stroke="#dd6b20" stroke-width="3"/>
    <text x="570" y="550" font-size="30" font-weight="700" text-anchor="middle" fill="#183153">Value (V)</text>
    <text x="450" y="590" font-size="22" fill="#7a3f12">What content do I contribute?</text>
    <text x="450" y="623" font-size="20" fill="#7a3f12">Example: semantic content to mix into the output.</text>
    <rect x="830" y="250" width="360" height="240" rx="22" fill="#fffdf8" stroke="#d7c9ad" stroke-width="2"/>
    <text x="865" y="302" font-size="28" font-weight="700" fill="#183153">Attention uses them like this</text>
    <text x="865" y="350" font-size="22" fill="#5f4a00">1. Compare one Query with all Keys.</text>
    <text x="865" y="390" font-size="22" fill="#245a3b">2. Turn those scores into attention weights.</text>
    <text x="865" y="430" font-size="22" fill="#7a3f12">3. Use the weights to mix the Values.</text>
  </g>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#7b8794"/>
    </marker>
  </defs>
  <path d="M 330 300 C 370 250, 380 220, 420 190" fill="none" stroke="#7b8794" stroke-width="4" marker-end="url(#arrow)"/>
  <path d="M 330 320 C 370 340, 380 365, 420 380" fill="none" stroke="#7b8794" stroke-width="4" marker-end="url(#arrow)"/>
  <path d="M 330 340 C 370 430, 380 500, 420 570" fill="none" stroke="#7b8794" stroke-width="4" marker-end="url(#arrow)"/>
</svg>
