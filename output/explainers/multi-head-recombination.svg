<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="760" viewBox="0 0 1280 760" role="img" aria-labelledby="title desc">
  <title id="title">Multi-head recombination after attention</title>
  <desc id="desc">Two head outputs are concatenated and then mixed by the output projection to produce one context-aware vector.</desc>
  <rect width="1280" height="760" fill="#f8f3e8"/>
  <text x="60" y="70" font-family="Helvetica, Arial, sans-serif" font-size="34" font-weight="700" fill="#183153">Multi-head attention keeps perspectives separate, then blends them</text>
  <text x="60" y="108" font-family="Helvetica, Arial, sans-serif" font-size="20" fill="#4c5b6b">Each head learns a different pattern. Concatenation preserves them. Output projection mixes them.</text>
  <g font-family="Helvetica, Arial, sans-serif" fill="#183153">
    <rect x="90" y="230" width="240" height="100" rx="20" fill="#e7f3ff" stroke="#2563eb" stroke-width="3"/>
    <text x="145" y="272" font-size="28" font-weight="700">Head 1 output</text>
    <text x="120" y="307" font-size="20">[0.1706, 0.1987, 0.1112]</text>
    <rect x="90" y="420" width="240" height="100" rx="20" fill="#e8f8f0" stroke="#2f855a" stroke-width="3"/>
    <text x="145" y="462" font-size="28" font-weight="700">Head 2 output</text>
    <text x="130" y="497" font-size="20">[0.2450, -0.0890, 0.1560]</text>
    <rect x="470" y="300" width="380" height="150" rx="22" fill="#fffdf8" stroke="#d7c9ad" stroke-width="2"/>
    <text x="560" y="350" font-size="28" font-weight="700">Concatenate</text>
    <text x="505" y="395" font-size="22">[0.1706, 0.1987, 0.1112, 0.2450, -0.0890, 0.1560]</text>
    <rect x="930" y="250" width="260" height="250" rx="22" fill="#fff4d8" stroke="#c48a00" stroke-width="3"/>
    <text x="985" y="305" font-size="28" font-weight="700">Output projection</text>
    <text x="985" y="350" font-size="22">Learned matrix Wᵒ</text>
    <text x="965" y="390" font-size="20">mixes information across heads</text>
    <text x="965" y="430" font-size="20">and returns one unified vector</text>
    <rect x="980" y="450" width="160" height="70" rx="16" fill="#fef3c7" stroke="#b7791f" stroke-width="2"/>
    <text x="1018" y="493" font-size="24" font-weight="700">final output</text>
    <rect x="470" y="540" width="720" height="110" rx="22" fill="#fffdf8" stroke="#d7c9ad" stroke-width="2"/>
    <text x="515" y="587" font-size="26" font-weight="700">Why not skip the output projection?</text>
    <text x="515" y="626" font-size="22" fill="#4c5b6b">Without Wᵒ, the heads are just stuck next to each other.</text>
    <text x="515" y="655" font-size="22" fill="#4c5b6b">With Wᵒ, the model learns how to combine multiple perspectives.</text>
  </g>
  <defs>
    <marker id="arrowMerge" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#7b8794"/>
    </marker>
  </defs>
  <path d="M 330 280 C 390 290, 400 320, 470 350" fill="none" stroke="#7b8794" stroke-width="4" marker-end="url(#arrowMerge)"/>
  <path d="M 330 470 C 390 460, 400 430, 470 400" fill="none" stroke="#7b8794" stroke-width="4" marker-end="url(#arrowMerge)"/>
  <path d="M 850 375 H 930" fill="none" stroke="#7b8794" stroke-width="4" marker-end="url(#arrowMerge)"/>
</svg>
