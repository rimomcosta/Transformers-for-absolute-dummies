<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="760" viewBox="0 0 1280 760" role="img" aria-labelledby="title desc">
  <title id="title">Similarity in embedding space</title>
  <desc id="desc">A conceptual embedding space where similar words sit closer together and unrelated words are farther apart.</desc>
  <rect width="1280" height="760" fill="#f8f3e8"/>
  <text x="60" y="70" font-family="Helvetica, Arial, sans-serif" font-size="34" font-weight="700" fill="#183153">After training, similar words end up near each other in embedding space</text>
  <text x="60" y="108" font-family="Helvetica, Arial, sans-serif" font-size="20" fill="#4c5b6b">The real space has many dimensions. This is a 2D teaching slice.</text>

  <rect x="90" y="160" width="860" height="500" rx="24" fill="#fffdf8" stroke="#d7c9ad" stroke-width="2"/>
  <line x1="180" y1="590" x2="880" y2="590" stroke="#9aa8b6" stroke-width="3"/>
  <line x1="180" y1="590" x2="180" y2="220" stroke="#9aa8b6" stroke-width="3"/>
  <text x="715" y="625" font-family="Helvetica, Arial, sans-serif" font-size="20" fill="#4c5b6b">food-ness</text>
  <text x="110" y="250" font-family="Helvetica, Arial, sans-serif" font-size="20" fill="#4c5b6b" transform="rotate(-90 110 250)">verb-ness / action</text>

  <g font-family="Helvetica, Arial, sans-serif" font-size="22" font-weight="700">
    <circle cx="650" cy="500" r="18" fill="#dd6b20"/>
    <text x="680" y="507" fill="#183153">pizza</text>
    <circle cx="720" cy="470" r="18" fill="#c05621"/>
    <text x="750" y="477" fill="#183153">pasta</text>
    <circle cx="610" cy="430" r="18" fill="#d97706"/>
    <text x="640" y="437" fill="#183153">burger</text>

    <circle cx="300" cy="360" r="18" fill="#2f855a"/>
    <text x="330" y="367" fill="#183153">love</text>
    <circle cx="360" cy="320" r="18" fill="#2563eb"/>
    <text x="390" y="327" fill="#183153">adore</text>
    <circle cx="260" cy="280" r="18" fill="#7c3aed"/>
    <text x="290" y="287" fill="#183153">run</text>

    <circle cx="460" cy="560" r="18" fill="#64748b"/>
    <text x="490" y="567" fill="#183153">table</text>
  </g>

  <path d="M 648 500 C 675 495, 695 485, 718 472" fill="none" stroke="#dd6b20" stroke-width="4" stroke-dasharray="8 6"/>
  <path d="M 300 360 C 322 348, 340 336, 358 323" fill="none" stroke="#2f855a" stroke-width="4" stroke-dasharray="8 6"/>

  <rect x="980" y="220" width="220" height="280" rx="20" fill="#fff4d8" stroke="#c48a00" stroke-width="2"/>
  <text x="1030" y="268" font-family="Helvetica, Arial, sans-serif" font-size="28" font-weight="700" fill="#183153">Read it like this</text>
  <text x="1010" y="320" font-family="Helvetica, Arial, sans-serif" font-size="22" fill="#4c5b6b">pizza and pasta sit close</text>
  <text x="1010" y="356" font-family="Helvetica, Arial, sans-serif" font-size="22" fill="#4c5b6b">because they share meaning.</text>
  <text x="1010" y="410" font-family="Helvetica, Arial, sans-serif" font-size="22" fill="#4c5b6b">love and adore sit close</text>
  <text x="1010" y="446" font-family="Helvetica, Arial, sans-serif" font-size="22" fill="#4c5b6b">because they behave similarly.</text>
</svg>
