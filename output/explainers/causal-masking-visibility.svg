<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="760" viewBox="0 0 1200 760" role="img" aria-labelledby="title desc">
  <title id="title">Causal masking visibility</title>
  <desc id="desc">A visibility grid showing that each position can attend only to itself and earlier tokens, not to future ones.</desc>
  <rect width="1200" height="760" fill="#f8f3e8"/>
  <text x="60" y="70" font-family="Helvetica, Arial, sans-serif" font-size="34" font-weight="700" fill="#183153">Causal masking prevents the model from looking ahead</text>
  <text x="60" y="108" font-family="Helvetica, Arial, sans-serif" font-size="20" fill="#4c5b6b">Row = token that is asking. Column = token it is allowed to see.</text>

  <text x="282" y="182" font-family="Helvetica, Arial, sans-serif" font-size="24" fill="#183153">I</text>
  <text x="412" y="182" font-family="Helvetica, Arial, sans-serif" font-size="24" fill="#183153">love</text>
  <text x="548" y="182" font-family="Helvetica, Arial, sans-serif" font-size="24" fill="#183153">pizza</text>
  <text x="687" y="182" font-family="Helvetica, Arial, sans-serif" font-size="24" fill="#183153">and</text>
  <text x="828" y="182" font-family="Helvetica, Arial, sans-serif" font-size="24" fill="#183153">pasta</text>

  <g font-family="Helvetica, Arial, sans-serif" font-size="24" fill="#183153">
    <text x="188" y="274">I</text>
    <text x="150" y="394">love</text>
    <text x="137" y="514">pizza</text>
    <text x="154" y="634">and</text>
    <text x="139" y="754">pasta</text>
  </g>

  <g stroke="#d7c9ad" stroke-width="2">
    <rect x="240" y="210" width="120" height="120" fill="#dff3e8"/>
    <rect x="360" y="210" width="120" height="120" fill="#f9d6d6"/>
    <rect x="480" y="210" width="120" height="120" fill="#f9d6d6"/>
    <rect x="600" y="210" width="120" height="120" fill="#f9d6d6"/>
    <rect x="720" y="210" width="120" height="120" fill="#f9d6d6"/>

    <rect x="240" y="330" width="120" height="120" fill="#dff3e8"/>
    <rect x="360" y="330" width="120" height="120" fill="#dff3e8"/>
    <rect x="480" y="330" width="120" height="120" fill="#f9d6d6"/>
    <rect x="600" y="330" width="120" height="120" fill="#f9d6d6"/>
    <rect x="720" y="330" width="120" height="120" fill="#f9d6d6"/>

    <rect x="240" y="450" width="120" height="120" fill="#dff3e8"/>
    <rect x="360" y="450" width="120" height="120" fill="#dff3e8"/>
    <rect x="480" y="450" width="120" height="120" fill="#dff3e8"/>
    <rect x="600" y="450" width="120" height="120" fill="#f9d6d6"/>
    <rect x="720" y="450" width="120" height="120" fill="#f9d6d6"/>

    <rect x="240" y="570" width="120" height="120" fill="#dff3e8"/>
    <rect x="360" y="570" width="120" height="120" fill="#dff3e8"/>
    <rect x="480" y="570" width="120" height="120" fill="#dff3e8"/>
    <rect x="600" y="570" width="120" height="120" fill="#dff3e8"/>
    <rect x="720" y="570" width="120" height="120" fill="#f9d6d6"/>

    <rect x="240" y="690" width="120" height="120" fill="#dff3e8"/>
    <rect x="360" y="690" width="120" height="120" fill="#dff3e8"/>
    <rect x="480" y="690" width="120" height="120" fill="#dff3e8"/>
    <rect x="600" y="690" width="120" height="120" fill="#dff3e8"/>
    <rect x="720" y="690" width="120" height="120" fill="#dff3e8"/>
  </g>

  <g font-family="Helvetica, Arial, sans-serif" font-size="36" font-weight="700">
    <text x="278" y="286" fill="#2f855a">✓</text>
    <text x="398" y="286" fill="#d64545">✗</text>
    <text x="518" y="286" fill="#d64545">✗</text>
    <text x="638" y="286" fill="#d64545">✗</text>
    <text x="758" y="286" fill="#d64545">✗</text>

    <text x="278" y="406" fill="#2f855a">✓</text>
    <text x="398" y="406" fill="#2f855a">✓</text>
    <text x="518" y="406" fill="#d64545">✗</text>
    <text x="638" y="406" fill="#d64545">✗</text>
    <text x="758" y="406" fill="#d64545">✗</text>

    <text x="278" y="526" fill="#2f855a">✓</text>
    <text x="398" y="526" fill="#2f855a">✓</text>
    <text x="518" y="526" fill="#2f855a">✓</text>
    <text x="638" y="526" fill="#d64545">✗</text>
    <text x="758" y="526" fill="#d64545">✗</text>

    <text x="278" y="646" fill="#2f855a">✓</text>
    <text x="398" y="646" fill="#2f855a">✓</text>
    <text x="518" y="646" fill="#2f855a">✓</text>
    <text x="638" y="646" fill="#2f855a">✓</text>
    <text x="758" y="646" fill="#d64545">✗</text>

    <text x="278" y="766" fill="#2f855a">✓</text>
    <text x="398" y="766" fill="#2f855a">✓</text>
    <text x="518" y="766" fill="#2f855a">✓</text>
    <text x="638" y="766" fill="#2f855a">✓</text>
    <text x="758" y="766" fill="#2f855a">✓</text>
  </g>

  <rect x="890" y="250" width="250" height="185" rx="22" fill="#fffdf8" stroke="#d7c9ad" stroke-width="2"/>
  <text x="930" y="300" font-family="Helvetica, Arial, sans-serif" font-size="22" font-weight="700" fill="#183153">Interpretation</text>
  <text x="930" y="340" font-family="Helvetica, Arial, sans-serif" font-size="20" fill="#2f855a">Green cells are visible.</text>
  <text x="930" y="375" font-family="Helvetica, Arial, sans-serif" font-size="20" fill="#d64545">Red cells are blocked.</text>
  <text x="930" y="410" font-family="Helvetica, Arial, sans-serif" font-size="20" fill="#4c5b6b">Each token can attend only</text>
  <text x="930" y="438" font-family="Helvetica, Arial, sans-serif" font-size="20" fill="#4c5b6b">to itself and earlier tokens.</text>
</svg>
