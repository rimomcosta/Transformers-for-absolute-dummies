<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="760" viewBox="0 0 1280 760" role="img" aria-labelledby="title desc">
  <title id="title">Autoregressive generation loop</title>
  <desc id="desc">A step-by-step loop showing prompt, predict next token, append it, and repeat with more context.</desc>
  <rect width="1280" height="760" fill="#f8f3e8"/>
  <text x="60" y="70" font-family="Helvetica, Arial, sans-serif" font-size="34" font-weight="700" fill="#183153">Autoregressive generation feeds each new token back into the next step</text>
  <text x="60" y="108" font-family="Helvetica, Arial, sans-serif" font-size="20" fill="#4c5b6b">The sentence grows one token at a time.</text>
  <g font-family="Helvetica, Arial, sans-serif" fill="#183153">
    <rect x="90" y="220" width="260" height="90" rx="20" fill="#eef8ff" stroke="#2563eb" stroke-width="3"/>
    <text x="155" y="275" font-size="28" font-weight="700">I love</text>
    <rect x="430" y="220" width="220" height="90" rx="20" fill="#fff4d8" stroke="#c48a00" stroke-width="3"/>
    <text x="478" y="275" font-size="28" font-weight="700">predict pizza</text>
    <rect x="730" y="220" width="310" height="90" rx="20" fill="#e8f8f0" stroke="#2f855a" stroke-width="3"/>
    <text x="790" y="275" font-size="28" font-weight="700">I love pizza</text>
    <rect x="1030" y="400" width="180" height="90" rx="20" fill="#fff4d8" stroke="#c48a00" stroke-width="3"/>
    <text x="1065" y="455" font-size="28" font-weight="700">predict and</text>
    <rect x="730" y="580" width="390" height="90" rx="20" fill="#e8f8f0" stroke="#2f855a" stroke-width="3"/>
    <text x="790" y="635" font-size="28" font-weight="700">I love pizza and</text>
  </g>
  <defs>
    <marker id="arrowLoop" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#7b8794"/>
    </marker>
  </defs>
  <path d="M 350 265 H 430" stroke="#7b8794" stroke-width="5" fill="none" marker-end="url(#arrowLoop)"/>
  <path d="M 650 265 H 730" stroke="#7b8794" stroke-width="5" fill="none" marker-end="url(#arrowLoop)"/>
  <path d="M 1040 310 C 1110 330, 1140 360, 1120 400" stroke="#7b8794" stroke-width="5" fill="none" marker-end="url(#arrowLoop)"/>
  <path d="M 1030 490 C 1010 530, 960 560, 925 580" stroke="#7b8794" stroke-width="5" fill="none" marker-end="url(#arrowLoop)"/>
</svg>
