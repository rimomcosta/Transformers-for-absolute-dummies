<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="700" viewBox="0 0 1200 700" role="img" aria-labelledby="title desc">
  <title id="title">Self-attention for pronoun resolution</title>
  <desc id="desc">A sentence where the token it attends strongly to cat and weakly to unrelated words.</desc>
  <rect width="1200" height="700" fill="#f8f3e8"/>
  <text x="60" y="70" font-family="Helvetica, Arial, sans-serif" font-size="34" font-weight="700" fill="#183153">Self-attention lets a word look for the right context</text>
  <text x="60" y="108" font-family="Helvetica, Arial, sans-serif" font-size="20" fill="#4c5b6b">Example: pronoun resolution in "The cat slept because it was tired."</text>

  <g font-family="Helvetica, Arial, sans-serif">
    <rect x="70" y="250" width="120" height="64" rx="18" fill="#f4f1ea" stroke="#b8a98c" stroke-width="2"/>
    <text x="108" y="290" font-size="24" fill="#183153">The</text>
    <rect x="210" y="250" width="120" height="64" rx="18" fill="#dff3e8" stroke="#2f855a" stroke-width="3"/>
    <text x="248" y="290" font-size="24" font-weight="700" fill="#183153">cat</text>
    <rect x="350" y="250" width="140" height="64" rx="18" fill="#f4f1ea" stroke="#b8a98c" stroke-width="2"/>
    <text x="390" y="290" font-size="24" fill="#183153">slept</text>
    <rect x="510" y="250" width="150" height="64" rx="18" fill="#f4f1ea" stroke="#b8a98c" stroke-width="2"/>
    <text x="538" y="290" font-size="24" fill="#183153">because</text>
    <rect x="680" y="235" width="120" height="94" rx="22" fill="#e7f3ff" stroke="#2563eb" stroke-width="4"/>
    <text x="728" y="275" font-size="22" fill="#183153">it</text>
    <text x="704" y="304" font-size="16" fill="#2563eb">current word</text>
    <rect x="820" y="250" width="120" height="64" rx="18" fill="#f4f1ea" stroke="#b8a98c" stroke-width="2"/>
    <text x="860" y="290" font-size="24" fill="#183153">was</text>
    <rect x="960" y="250" width="150" height="64" rx="18" fill="#f4f1ea" stroke="#b8a98c" stroke-width="2"/>
    <text x="998" y="290" font-size="24" fill="#183153">tired</text>
  </g>

  <defs>
    <marker id="arrowStrong" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#2f855a"/>
    </marker>
    <marker id="arrowWeak" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#94a3b8"/>
    </marker>
  </defs>

  <path d="M 740 235 C 690 140, 470 140, 270 245" fill="none" stroke="#2f855a" stroke-width="8" marker-end="url(#arrowStrong)"/>
  <path d="M 740 235 C 690 175, 160 170, 130 245" fill="none" stroke="#94a3b8" stroke-width="3" stroke-dasharray="8 8" marker-end="url(#arrowWeak)"/>
  <path d="M 740 330 C 790 395, 890 398, 900 315" fill="none" stroke="#94a3b8" stroke-width="3" stroke-dasharray="8 8" marker-end="url(#arrowWeak)"/>
  <path d="M 740 330 C 840 420, 1020 420, 1035 315" fill="none" stroke="#94a3b8" stroke-width="3" stroke-dasharray="8 8" marker-end="url(#arrowWeak)"/>

  <rect x="120" y="440" width="960" height="170" rx="24" fill="#fffdf8" stroke="#d7c9ad" stroke-width="2"/>
  <text x="155" y="485" font-family="Helvetica, Arial, sans-serif" font-size="24" font-weight="700" fill="#183153">What the token "it" is doing</text>
  <text x="155" y="525" font-family="Helvetica, Arial, sans-serif" font-size="22" fill="#183153">Query: "Which earlier word is the likely referent?"</text>
  <text x="155" y="562" font-family="Helvetica, Arial, sans-serif" font-size="22" fill="#2f855a">Strong attention to "cat" because it is a noun that can be tired.</text>
  <text x="155" y="599" font-family="Helvetica, Arial, sans-serif" font-size="22" fill="#64748b">Weak attention to articles and verbs because they are poor referents.</text>
</svg>
