<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="820" viewBox="0 0 1280 820" role="img" aria-labelledby="title desc">
  <title id="title">Gradient flow through the transformer stack</title>
  <desc id="desc">A layered diagram showing loss at the top, then gradients flowing backward through output, transformer blocks, and embeddings.</desc>
  <rect width="1280" height="820" fill="#f8f3e8"/>
  <text x="60" y="70" font-family="Helvetica, Arial, sans-serif" font-size="34" font-weight="700" fill="#183153">Backpropagation sends gradient backward through every layer</text>
  <text x="60" y="108" font-family="Helvetica, Arial, sans-serif" font-size="20" fill="#4c5b6b">Residual paths help keep the gradient alive as it travels through depth.</text>

  <g font-family="Helvetica, Arial, sans-serif" fill="#183153">
    <rect x="500" y="140" width="280" height="70" rx="18" fill="#ffece3" stroke="#dd6b20" stroke-width="3"/>
    <text x="610" y="184" font-size="30" font-weight="700">Loss</text>

    <rect x="470" y="250" width="340" height="70" rx="18" fill="#fff4d8" stroke="#c48a00" stroke-width="3"/>
    <text x="540" y="294" font-size="28" font-weight="700">Softmax + output head</text>

    <rect x="430" y="360" width="420" height="70" rx="18" fill="#eef8ff" stroke="#2563eb" stroke-width="3"/>
    <text x="505" y="404" font-size="28" font-weight="700">Transformer block N</text>

    <rect x="430" y="470" width="420" height="70" rx="18" fill="#eef8ff" stroke="#2563eb" stroke-width="3"/>
    <text x="505" y="514" font-size="28" font-weight="700">Transformer block N-1</text>

    <rect x="430" y="580" width="420" height="70" rx="18" fill="#eef8ff" stroke="#2563eb" stroke-width="3"/>
    <text x="505" y="624" font-size="28" font-weight="700">...</text>

    <rect x="430" y="690" width="420" height="70" rx="18" fill="#e8f8f0" stroke="#2f855a" stroke-width="3"/>
    <text x="535" y="734" font-size="28" font-weight="700">Embeddings</text>

    <path d="M 320 395 H 430" stroke="#2f855a" stroke-width="6" fill="none"/>
    <path d="M 320 505 H 430" stroke="#2f855a" stroke-width="6" fill="none"/>
    <text x="110" y="405" font-size="22" fill="#2f855a">Residual paths help</text>
    <text x="110" y="435" font-size="22" fill="#2f855a">the gradient bypass</text>
    <text x="110" y="465" font-size="22" fill="#2f855a">fragile sublayers.</text>
  </g>

  <defs>
    <marker id="arrowGrad" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#d64545"/>
    </marker>
  </defs>
  <path d="M 640 210 V 250" stroke="#d64545" stroke-width="6" fill="none" marker-end="url(#arrowGrad)"/>
  <path d="M 640 320 V 360" stroke="#d64545" stroke-width="6" fill="none" marker-end="url(#arrowGrad)"/>
  <path d="M 640 430 V 470" stroke="#d64545" stroke-width="6" fill="none" marker-end="url(#arrowGrad)"/>
  <path d="M 640 540 V 580" stroke="#d64545" stroke-width="6" fill="none" marker-end="url(#arrowGrad)"/>
  <path d="M 640 650 V 690" stroke="#d64545" stroke-width="6" fill="none" marker-end="url(#arrowGrad)"/>
</svg>
