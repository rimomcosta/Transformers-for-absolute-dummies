<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="760" viewBox="0 0 1200 760" role="img" aria-labelledby="title desc">
  <title id="title">KV cache reuse during generation</title>
  <desc id="desc">A before and after comparison showing repeated recomputation versus reusing previous keys and values from cache.</desc>
  <rect width="1200" height="760" fill="#f8f3e8"/>
  <text x="60" y="70" font-family="Helvetica, Arial, sans-serif" font-size="34" font-weight="700" fill="#183153">KV cache keeps generation from recomputing the whole past</text>
  <text x="60" y="108" font-family="Helvetica, Arial, sans-serif" font-size="20" fill="#4c5b6b">Same sequence growth, very different amount of work</text>

  <rect x="60" y="150" width="500" height="520" rx="24" fill="#fffdf8" stroke="#d7c9ad" stroke-width="2"/>
  <rect x="640" y="150" width="500" height="520" rx="24" fill="#fffdf8" stroke="#d7c9ad" stroke-width="2"/>

  <text x="90" y="200" font-family="Helvetica, Arial, sans-serif" font-size="28" font-weight="700" fill="#d64545">Without cache</text>
  <text x="670" y="200" font-family="Helvetica, Arial, sans-serif" font-size="28" font-weight="700" fill="#2f855a">With cache</text>

  <g font-family="Helvetica, Arial, sans-serif" font-size="22" fill="#183153">
    <text x="95" y="255">Step 1: "I love"</text>
    <rect x="95" y="275" width="110" height="52" rx="14" fill="#e7f3ff" stroke="#3b82c4" stroke-width="2"/>
    <rect x="218" y="275" width="110" height="52" rx="14" fill="#e8f8f0" stroke="#2f855a" stroke-width="2"/>
    <text x="120" y="308">I</text>
    <text x="245" y="308">love</text>
    <text x="95" y="360">Step 2: "I love pizza"</text>
    <rect x="95" y="380" width="110" height="52" rx="14" fill="#fde8e8" stroke="#d64545" stroke-width="2"/>
    <rect x="218" y="380" width="110" height="52" rx="14" fill="#fde8e8" stroke="#d64545" stroke-width="2"/>
    <rect x="341" y="380" width="110" height="52" rx="14" fill="#fff1e8" stroke="#dd6b20" stroke-width="2"/>
    <text x="120" y="413">redo I</text>
    <text x="230" y="413">redo love</text>
    <text x="372" y="413">pizza</text>
    <text x="95" y="485">Step 3: "I love pizza and"</text>
    <rect x="95" y="505" width="90" height="52" rx="14" fill="#fde8e8" stroke="#d64545" stroke-width="2"/>
    <rect x="195" y="505" width="110" height="52" rx="14" fill="#fde8e8" stroke="#d64545" stroke-width="2"/>
    <rect x="318" y="505" width="110" height="52" rx="14" fill="#fde8e8" stroke="#d64545" stroke-width="2"/>
    <rect x="441" y="505" width="90" height="52" rx="14" fill="#fff1e8" stroke="#dd6b20" stroke-width="2"/>
    <text x="116" y="538">redo</text>
    <text x="220" y="538">redo</text>
    <text x="343" y="538">redo</text>
    <text x="470" y="538">and</text>
    <text x="95" y="610" font-size="20" fill="#d64545">Work keeps growing because old keys and values are recomputed.</text>
  </g>

  <g font-family="Helvetica, Arial, sans-serif" font-size="22" fill="#183153">
    <text x="675" y="255">Step 1: compute and store</text>
    <rect x="675" y="275" width="110" height="52" rx="14" fill="#e7f3ff" stroke="#3b82c4" stroke-width="2"/>
    <rect x="798" y="275" width="110" height="52" rx="14" fill="#e8f8f0" stroke="#2f855a" stroke-width="2"/>
    <text x="700" y="308">I</text>
    <text x="825" y="308">love</text>
    <rect x="940" y="250" width="160" height="110" rx="18" fill="#eef8ff" stroke="#2563eb" stroke-width="2"/>
    <text x="985" y="294">KV cache</text>
    <text x="967" y="326" font-size="18">K1 V1 K2 V2</text>

    <text x="675" y="390">Step 2: reuse cache + compute only new token</text>
    <rect x="675" y="415" width="245" height="52" rx="14" fill="#ecfdf5" stroke="#2f855a" stroke-width="2"/>
    <text x="703" y="448">reuse K1 V1 and K2 V2</text>
    <rect x="940" y="415" width="110" height="52" rx="14" fill="#fff1e8" stroke="#dd6b20" stroke-width="2"/>
    <text x="972" y="448">pizza</text>

    <text x="675" y="520">Step 3: reuse again + compute only the newest token</text>
    <rect x="675" y="545" width="245" height="52" rx="14" fill="#ecfdf5" stroke="#2f855a" stroke-width="2"/>
    <text x="705" y="578">reuse all previous K and V</text>
    <rect x="940" y="545" width="110" height="52" rx="14" fill="#fff1e8" stroke="#dd6b20" stroke-width="2"/>
    <text x="976" y="578">and</text>
    <text x="675" y="620" font-size="20" fill="#2f855a">Only the new token adds fresh Q, K, and V computation.</text>
  </g>

  <path d="M 910 435 C 940 430, 955 390, 1000 360" fill="none" stroke="#2563eb" stroke-width="4"/>
  <path d="M 910 565 C 945 558, 962 430, 1000 360" fill="none" stroke="#2563eb" stroke-width="4"/>
</svg>
