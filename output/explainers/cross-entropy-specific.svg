<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="760" viewBox="0 0 1280 760" role="img" aria-labelledby="title desc">
  <title id="title">Cross-entropy as confidence on the correct answer</title>
  <desc id="desc">A comparison showing low loss when the model assigns high probability to the correct token and high loss when it assigns low probability to the correct token.</desc>
  <rect width="1280" height="760" fill="#f8f3e8"/>
  <text x="60" y="70" font-family="Helvetica, Arial, sans-serif" font-size="34" font-weight="700" fill="#183153">Cross-entropy asks one question: how much probability did you give the correct token?</text>
  <text x="60" y="108" font-family="Helvetica, Arial, sans-serif" font-size="20" fill="#4c5b6b">Same target, different confidence, very different loss.</text>

  <g font-family="Helvetica, Arial, sans-serif">
    <rect x="70" y="170" width="520" height="460" rx="24" fill="#fffdf8" stroke="#d7c9ad" stroke-width="2"/>
    <rect x="690" y="170" width="520" height="460" rx="24" fill="#fffdf8" stroke="#d7c9ad" stroke-width="2"/>

    <text x="110" y="225" font-size="30" font-weight="700" fill="#2f855a">Good prediction</text>
    <text x="110" y="262" font-size="22" fill="#4c5b6b">Correct token = pizza</text>
    <rect x="130" y="320" width="330" height="58" rx="14" fill="#dcfce7" stroke="#2f855a" stroke-width="2"/>
    <text x="160" y="357" font-size="24" fill="#183153">P(pizza) = 0.90</text>
    <rect x="130" y="410" width="70" height="34" rx="10" fill="#dff3e8"/>
    <text x="148" y="434" font-size="18" fill="#2f855a">high</text>
    <text x="130" y="500" font-size="24" fill="#183153">Loss = -log(0.90) ≈ 0.105</text>
    <text x="130" y="545" font-size="22" fill="#2f855a">Low loss because the model was confident and correct.</text>

    <text x="730" y="225" font-size="30" font-weight="700" fill="#d64545">Bad prediction</text>
    <text x="730" y="262" font-size="22" fill="#4c5b6b">Correct token = pizza</text>
    <rect x="750" y="320" width="90" height="58" rx="14" fill="#fee2e2" stroke="#d64545" stroke-width="2"/>
    <text x="768" y="357" font-size="24" fill="#183153">0.01</text>
    <rect x="870" y="320" width="250" height="58" rx="14" fill="#eef2ff" stroke="#6366f1" stroke-width="2"/>
    <text x="895" y="357" font-size="22" fill="#183153">most probability went elsewhere</text>
    <rect x="750" y="410" width="70" height="34" rx="10" fill="#fde2e2"/>
    <text x="767" y="434" font-size="18" fill="#d64545">low</text>
    <text x="750" y="500" font-size="24" fill="#183153">Loss = -log(0.01) ≈ 4.605</text>
    <text x="750" y="545" font-size="22" fill="#d64545">High loss because the model put almost no mass on the correct answer.</text>

    <rect x="180" y="650" width="920" height="70" rx="18" fill="#fff4d8" stroke="#c48a00" stroke-width="2"/>
    <text x="225" y="694" font-size="24" font-weight="700" fill="#5f4a00">Cross-entropy does not care that the correct word was somewhere in the list. It cares how confident you were in it.</text>
  </g>
</svg>
