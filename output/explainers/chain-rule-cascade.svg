<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="760" viewBox="0 0 1280 760" role="img" aria-labelledby="title desc">
  <title id="title">Chain rule as cascading influence</title>
  <desc id="desc">A flow showing how a small change in an earlier quantity affects later quantities through a chain of multipliers.</desc>
  <rect width="1280" height="760" fill="#f8f3e8"/>
  <text x="60" y="70" font-family="Helvetica, Arial, sans-serif" font-size="34" font-weight="700" fill="#183153">The chain rule multiplies influence through a sequence of steps</text>
  <text x="60" y="108" font-family="Helvetica, Arial, sans-serif" font-size="20" fill="#4c5b6b">To know how a weight changes the loss, follow every dependency between them.</text>

  <g font-family="Helvetica, Arial, sans-serif" fill="#183153">
    <rect x="90" y="290" width="190" height="96" rx="20" fill="#eef8ff" stroke="#2563eb" stroke-width="3"/>
    <text x="150" y="345" font-size="28" font-weight="700">Weight W</text>

    <rect x="370" y="290" width="190" height="96" rx="20" fill="#fff4d8" stroke="#c48a00" stroke-width="3"/>
    <text x="420" y="345" font-size="28" font-weight="700">Logit</text>

    <rect x="650" y="290" width="190" height="96" rx="20" fill="#e8f8f0" stroke="#2f855a" stroke-width="3"/>
    <text x="665" y="345" font-size="28" font-weight="700">Probability</text>

    <rect x="930" y="290" width="190" height="96" rx="20" fill="#ffece3" stroke="#dd6b20" stroke-width="3"/>
    <text x="990" y="345" font-size="28" font-weight="700">Loss</text>

    <text x="180" y="470" font-size="24">∂logit / ∂W</text>
    <text x="450" y="470" font-size="24">∂prob / ∂logit</text>
    <text x="715" y="470" font-size="24">∂loss / ∂prob</text>

    <rect x="140" y="560" width="980" height="110" rx="20" fill="#fffdf8" stroke="#d7c9ad" stroke-width="2"/>
    <text x="180" y="610" font-size="28" font-weight="700">Combine them</text>
    <text x="180" y="650" font-size="26">∂L/∂W = (∂L/∂prob) × (∂prob/∂logit) × (∂logit/∂W)</text>
  </g>

  <defs>
    <marker id="arrowCascade" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#7b8794"/>
    </marker>
  </defs>
  <path d="M 280 338 H 370" fill="none" stroke="#7b8794" stroke-width="5" marker-end="url(#arrowCascade)"/>
  <path d="M 560 338 H 650" fill="none" stroke="#7b8794" stroke-width="5" marker-end="url(#arrowCascade)"/>
  <path d="M 840 338 H 930" fill="none" stroke="#7b8794" stroke-width="5" marker-end="url(#arrowCascade)"/>
</svg>
