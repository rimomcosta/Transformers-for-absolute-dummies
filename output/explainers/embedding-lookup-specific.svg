<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="760" viewBox="0 0 1280 760" role="img" aria-labelledby="title desc">
  <title id="title">Embedding lookup from token IDs</title>
  <desc id="desc">A diagram showing token IDs selecting rows from the embedding matrix to produce a matrix of word vectors.</desc>
  <rect width="1280" height="760" fill="#f8f3e8"/>
  <text x="60" y="70" font-family="Helvetica, Arial, sans-serif" font-size="34" font-weight="700" fill="#183153">An embedding lookup is just selecting rows from a big learned table</text>
  <text x="60" y="108" font-family="Helvetica, Arial, sans-serif" font-size="20" fill="#4c5b6b">Token IDs do not contain meaning. They point to vectors that do.</text>

  <g font-family="Helvetica, Arial, sans-serif" fill="#183153">
    <rect x="80" y="220" width="220" height="180" rx="20" fill="#eef8ff" stroke="#2563eb" stroke-width="3"/>
    <text x="130" y="270" font-size="28" font-weight="700">Token IDs</text>
    <text x="120" y="320" font-size="24">123  →  "I"</text>
    <text x="120" y="360" font-size="24">567  →  "love"</text>
    <text x="120" y="400" font-size="24">999  →  "pizza"</text>

    <rect x="410" y="150" width="390" height="430" rx="22" fill="#fffdf8" stroke="#d7c9ad" stroke-width="2"/>
    <text x="505" y="198" font-size="28" font-weight="700">Embedding matrix E</text>
    <text x="475" y="240" font-size="20" fill="#4c5b6b">50,000 rows × 6 columns</text>

    <rect x="455" y="285" width="300" height="60" rx="14" fill="#dbeafe" stroke="#2563eb" stroke-width="2"/>
    <text x="490" y="322" font-size="22">row 123  →  [0.01, -0.20, ...]</text>
    <rect x="455" y="375" width="300" height="60" rx="14" fill="#dcfce7" stroke="#2f855a" stroke-width="2"/>
    <text x="485" y="412" font-size="22">row 567  →  [-0.40, 0.60, ...]</text>
    <rect x="455" y="465" width="300" height="60" rx="14" fill="#ffedd5" stroke="#dd6b20" stroke-width="2"/>
    <text x="485" y="502" font-size="22">row 999  →  [0.90, -0.10, ...]</text>

    <rect x="915" y="260" width="270" height="210" rx="20" fill="#fff4d8" stroke="#c48a00" stroke-width="3"/>
    <text x="965" y="308" font-size="28" font-weight="700">Output X</text>
    <text x="945" y="352" font-size="22">3 words × 6 dimensions</text>
    <text x="955" y="395" font-size="20">row 1 = embedding of "I"</text>
    <text x="955" y="427" font-size="20">row 2 = embedding of "love"</text>
    <text x="955" y="459" font-size="20">row 3 = embedding of "pizza"</text>
  </g>

  <defs>
    <marker id="arrowEmbed" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#7b8794"/>
    </marker>
  </defs>
  <path d="M 300 315 H 455" stroke="#7b8794" stroke-width="4" fill="none" marker-end="url(#arrowEmbed)"/>
  <path d="M 300 355 H 455" stroke="#7b8794" stroke-width="4" fill="none" marker-end="url(#arrowEmbed)"/>
  <path d="M 300 395 H 455" stroke="#7b8794" stroke-width="4" fill="none" marker-end="url(#arrowEmbed)"/>
  <path d="M 755 405 H 915" stroke="#7b8794" stroke-width="5" fill="none" marker-end="url(#arrowEmbed)"/>
</svg>
