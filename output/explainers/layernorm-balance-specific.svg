<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="760" viewBox="0 0 1280 760" role="img" aria-labelledby="title desc">
  <title id="title">Layer normalization re-centers and rescales activations</title>
  <desc id="desc">A vector before normalization with uneven magnitudes and after normalization with balanced centered values.</desc>
  <rect width="1280" height="760" fill="#f8f3e8"/>
  <text x="60" y="70" font-family="Helvetica, Arial, sans-serif" font-size="34" font-weight="700" fill="#183153">Layer normalization makes the vector numerically stable again</text>
  <text x="60" y="108" font-family="Helvetica, Arial, sans-serif" font-size="20" fill="#4c5b6b">Center around the mean, scale by the standard deviation, then continue with a healthier signal.</text>
  <g font-family="Helvetica, Arial, sans-serif" fill="#183153">
    <text x="150" y="210" font-size="28" font-weight="700">Before LayerNorm</text>
    <rect x="120" y="250" width="420" height="170" rx="22" fill="#fffdf8" stroke="#d7c9ad" stroke-width="2"/>
    <text x="160" y="315" font-size="24">[0.66, -0.49, 0.97, 0.47, -0.16, 0.71]</text>
    <text x="160" y="365" font-size="22" fill="#d64545">shifted and uneven</text>
    <text x="615" y="210" font-size="28" font-weight="700">Normalize</text>
    <rect x="585" y="250" width="180" height="170" rx="22" fill="#fff4d8" stroke="#c48a00" stroke-width="3"/>
    <text x="620" y="318" font-size="26" font-weight="700">subtract mean</text>
    <text x="640" y="360" font-size="26" font-weight="700">divide by std</text>
    <text x="850" y="210" font-size="28" font-weight="700">After LayerNorm</text>
    <rect x="820" y="250" width="340" height="170" rx="22" fill="#e8f8f0" stroke="#2f855a" stroke-width="3"/>
    <text x="850" y="315" font-size="24">[-0.90, -1.54, 1.05, 0.27, -0.49, 0.61]</text>
    <text x="850" y="365" font-size="22" fill="#2f855a">centered and rescaled</text>
  </g>
  <defs>
    <marker id="arrowNorm" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#7b8794"/>
    </marker>
  </defs>
  <path d="M 540 335 H 585" stroke="#7b8794" stroke-width="5" fill="none" marker-end="url(#arrowNorm)"/>
  <path d="M 765 335 H 820" stroke="#7b8794" stroke-width="5" fill="none" marker-end="url(#arrowNorm)"/>
</svg>
