<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="760" viewBox="0 0 1280 760" role="img" aria-labelledby="title desc">
  <title id="title">Attention score matrix for a single example</title>
  <desc id="desc">A specific example of how one query is compared against all keys to produce raw attention scores before softmax.</desc>
  <rect width="1280" height="760" fill="#f8f3e8"/>
  <text x="60" y="70" font-family="Helvetica, Arial, sans-serif" font-size="34" font-weight="700" fill="#183153">Compute one row of attention by comparing one query to all keys</text>
  <text x="60" y="108" font-family="Helvetica, Arial, sans-serif" font-size="20" fill="#4c5b6b">Each score is a dot product: how well does this query match that key?</text>
  <g font-family="Helvetica, Arial, sans-serif" fill="#183153">
    <rect x="90" y="220" width="190" height="86" rx="18" fill="#fff4d8" stroke="#c48a00" stroke-width="3"/>
    <text x="140" y="258" font-size="28" font-weight="700">Query for "I"</text>
    <text x="133" y="288" font-size="20">Q_I = [0.18, -0.06, 0.45]</text>
    <rect x="440" y="180" width="190" height="70" rx="18" fill="#e7f3ff" stroke="#2563eb" stroke-width="3"/>
    <text x="505" y="222" font-size="24" font-weight="700">K_I</text>
    <rect x="440" y="285" width="190" height="70" rx="18" fill="#e8f8f0" stroke="#2f855a" stroke-width="3"/>
    <text x="485" y="327" font-size="24" font-weight="700">K_love</text>
    <rect x="440" y="390" width="190" height="70" rx="18" fill="#ffece3" stroke="#dd6b20" stroke-width="3"/>
    <text x="480" y="432" font-size="24" font-weight="700">K_pizza</text>
    <rect x="820" y="180" width="260" height="70" rx="18" fill="#e7f3ff" stroke="#2563eb" stroke-width="3"/>
    <text x="850" y="223" font-size="22">Q_I · K_I = -0.0426</text>
    <rect x="820" y="285" width="260" height="70" rx="18" fill="#e8f8f0" stroke="#2f855a" stroke-width="3"/>
    <text x="840" y="328" font-size="22">Q_I · K_love = -0.0246</text>
    <rect x="820" y="390" width="260" height="70" rx="18" fill="#ffece3" stroke="#dd6b20" stroke-width="3"/>
    <text x="835" y="433" font-size="22">Q_I · K_pizza = 0.2841</text>
    <rect x="90" y="510" width="1040" height="170" rx="22" fill="#fffdf8" stroke="#d7c9ad" stroke-width="2"/>
    <text x="130" y="560" font-size="28" font-weight="700">Interpretation of the raw scores</text>
    <text x="130" y="604" font-size="22" fill="#2563eb">Negative scores mean the query and key do not align strongly.</text>
    <text x="130" y="640" font-size="22" fill="#dd6b20">The largest score marks the key that the query finds most relevant before softmax.</text>
  </g>
  <defs>
    <marker id="arrowGray" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#7b8794"/>
    </marker>
  </defs>
  <path d="M 280 245 C 340 225, 365 215, 440 215" fill="none" stroke="#7b8794" stroke-width="4" marker-end="url(#arrowGray)"/>
  <path d="M 280 263 C 340 300, 365 320, 440 320" fill="none" stroke="#7b8794" stroke-width="4" marker-end="url(#arrowGray)"/>
  <path d="M 280 280 C 340 375, 365 425, 440 425" fill="none" stroke="#7b8794" stroke-width="4" marker-end="url(#arrowGray)"/>
  <path d="M 630 215 H 820" fill="none" stroke="#7b8794" stroke-width="4" marker-end="url(#arrowGray)"/>
  <path d="M 630 320 H 820" fill="none" stroke="#7b8794" stroke-width="4" marker-end="url(#arrowGray)"/>
  <path d="M 630 425 H 820" fill="none" stroke="#7b8794" stroke-width="4" marker-end="url(#arrowGray)"/>
</svg>
