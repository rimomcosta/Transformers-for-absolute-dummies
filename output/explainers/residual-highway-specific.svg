<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="760" viewBox="0 0 1280 760" role="img" aria-labelledby="title desc">
  <title id="title">Residual connection as a shortcut highway</title>
  <desc id="desc">A block where the main transformed path is added to the original input through a shortcut path before normalization.</desc>
  <rect width="1280" height="760" fill="#f8f3e8"/>
  <text x="60" y="70" font-family="Helvetica, Arial, sans-serif" font-size="34" font-weight="700" fill="#183153">Residual connections preserve the original signal while the layer learns a change</text>
  <text x="60" y="108" font-family="Helvetica, Arial, sans-serif" font-size="20" fill="#4c5b6b">Instead of replacing x, the block learns something to add on top of x.</text>
  <g font-family="Helvetica, Arial, sans-serif" fill="#183153">
    <rect x="90" y="310" width="180" height="90" rx="20" fill="#eef8ff" stroke="#2563eb" stroke-width="3"/>
    <text x="155" y="365" font-size="30" font-weight="700">input x</text>
    <rect x="460" y="220" width="250" height="100" rx="20" fill="#fff4d8" stroke="#c48a00" stroke-width="3"/>
    <text x="535" y="280" font-size="28" font-weight="700">Attention or FFN</text>
    <circle cx="860" cy="360" r="42" fill="#fef3c7" stroke="#b7791f" stroke-width="3"/>
    <text x="846" y="370" font-size="38" font-weight="700">+</text>
    <rect x="980" y="310" width="200" height="90" rx="20" fill="#e8f8f0" stroke="#2f855a" stroke-width="3"/>
    <text x="1020" y="365" font-size="30" font-weight="700">x + f(x)</text>
    <text x="120" y="520" font-size="24" font-weight="700">Shortcut path keeps information and gradients moving.</text>
  </g>
  <defs>
    <marker id="arrowRes" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#7b8794"/>
    </marker>
  </defs>
  <path d="M 270 355 H 460" stroke="#7b8794" stroke-width="5" fill="none" marker-end="url(#arrowRes)"/>
  <path d="M 710 270 C 790 280, 810 320, 825 345" stroke="#7b8794" stroke-width="5" fill="none" marker-end="url(#arrowRes)"/>
  <path d="M 270 355 C 340 470, 760 470, 820 380" stroke="#2f855a" stroke-width="7" fill="none" marker-end="url(#arrowRes)"/>
  <path d="M 902 360 H 980" stroke="#7b8794" stroke-width="5" fill="none" marker-end="url(#arrowRes)"/>
</svg>
